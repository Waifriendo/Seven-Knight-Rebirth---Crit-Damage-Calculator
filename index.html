<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7K Re:BIRTH - Stat Calc</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: #1e1e24;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
            position: relative;
        }
        /* ปุ่มเปลี่ยนภาษา */
        .lang-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        .lang-btn:hover { background-color: #555; }
        
        h2 {
            text-align: center;
            color: #fca311;
            margin-top: 10px;
            font-size: 22px;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        .stat-box {
            background-color: #2b2b36;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #4a4a5a;
        }
        .stat-box.new { border-left-color: #fca311; }
        h3 { margin: 0 0 15px 0; font-size: 16px; color: #fff; }
        .input-group {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            align-items: center;
        }
        .input-group label { font-size: 14px; color: #aaa; }
        .input-group input {
            width: 120px;
            padding: 8px;
            background-color: #121212;
            border: 1px solid #444;
            color: #fff;
            border-radius: 6px;
            text-align: right;
            font-size: 16px;
        }
        .input-group input:focus { outline: none; border-color: #fca311; }
        button.calc-btn {
            width: 100%;
            padding: 15px;
            background-color: #fca311;
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        button.calc-btn:hover { background-color: #e59400; transform: translateY(-2px); }
        button.calc-btn:active { transform: translateY(0); }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            display: none;
            background-color: #121212;
            border: 1px solid #333;
        }
        .better { color: #4ade80; font-weight: bold; font-size: 20px; display: block; margin-top: 10px;}
        .worse { color: #f87171; font-weight: bold; font-size: 20px; display: block; margin-top: 10px;}
        .highlight { color: #fca311; font-weight: bold; font-size: 18px; }
        .diff { font-size: 14px; color: #888; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <button class="lang-btn" onclick="toggleLang()" id="langToggle">ENG</button>

    <h2 id="text-title">⚔️ คำนวณดาเมจคริติคอล</h2>
    
    <div class="stat-box">
        <h3 id="text-old-box">สเตตัสเดิม (ของที่ใส่อยู่)</h3>
        <div class="input-group">
            <label id="text-old-atk">พลังโจมตี (Atk):</label>
            <input type="number" id="oldAtk" placeholder="0">
        </div>
        <div class="input-group">
            <label id="text-old-crit">คริแดม % (Crit Dmg):</label>
            <input type="number" id="oldCritDmg" placeholder="0">
        </div>
    </div>

    <div class="stat-box new">
        <h3 id="text-new-box">สเตตัสใหม่ (ของชิ้นใหม่)</h3>
        <div class="input-group">
            <label id="text-new-atk">พลังโจมตี (Atk):</label>
            <input type="number" id="newAtk" placeholder="0">
        </div>
        <div class="input-group">
            <label id="text-new-crit">คริแดม % (Crit Dmg):</label>
            <input type="number" id="newCritDmg" placeholder="0">
        </div>
    </div>

    <button class="calc-btn" onclick="calculateDamage()" id="text-btn">คำนวณเปรียบเทียบ</button>

    <div id="result"></div>
</div>

<script>
    // ชุดคำแปลภาษา
    const lang = {
        th: {
            title: "⚔️ คำนวณดาเมจคริติคอล",
            oldBox: "สเตตัสเดิม (ของที่ใส่อยู่)",
            newBox: "สเตตัสใหม่ (ของชิ้นใหม่)",
            atkLabel: "พลังโจมตี (Atk):",
            critLabel: "คริแดม % (Crit Dmg):",
            btn: "คำนวณเปรียบเทียบ",
            resOld: "ดาเมจเดิม:",
            resNew: "ดาเมจใหม่:",
            better: "✅ เปลี่ยนเลย! ตีแรงขึ้น",
            worse: "❌ อย่าเปลี่ยน! ตีเบาลง",
            equal: "⚖️ ดาเมจเท่าเดิมเป๊ะ",
            dmgUp: "(ดาเมจเพิ่มขึ้น ",
            dmgDown: "(ดาเมจหายไป ",
            unit: " หน่วย)"
        },
        en: {
            title: "⚔️ Crit Damage Calc",
            oldBox: "Old Stats (Current)",
            newBox: "New Stats (To Equip)",
            atkLabel: "Attack (Atk):",
            critLabel: "Crit Dmg (%):",
            btn: "Compare Damage",
            resOld: "Old Dmg:",
            resNew: "New Dmg:",
            better: "✅ Upgrade! Higher Dmg",
            worse: "❌ Don't! Lower Dmg",
            equal: "⚖️ Damage is exactly the same",
            dmgUp: "(Damage increased by ",
            dmgDown: "(Damage lost by ",
            unit: " pts)"
        }
    };

    let currentLang = 'th';

    // ฟังก์ชันสลับภาษา
    function toggleLang() {
        currentLang = currentLang === 'th' ? 'en' : 'th';
        
        // อัปเดตข้อความบนปุ่ม
        document.getElementById('langToggle').innerText = currentLang === 'th' ? 'ENG' : 'TH';
        
        // อัปเดตข้อความในหน้าเว็บ
        document.getElementById('text-title').innerText = lang[currentLang].title;
        document.getElementById('text-old-box').innerText = lang[currentLang].oldBox;
        document.getElementById('text-new-box').innerText = lang[currentLang].newBox;
        
        document.getElementById('text-old-atk').innerText = lang[currentLang].atkLabel;
        document.getElementById('text-old-crit').innerText = lang[currentLang].critLabel;
        document.getElementById('text-new-atk').innerText = lang[currentLang].atkLabel;
        document.getElementById('text-new-crit').innerText = lang[currentLang].critLabel;
        
        document.getElementById('text-btn').innerText = lang[currentLang].btn;

        // ถ้ามีการคำนวณค้างไว้ ให้กดคำนวณใหม่เพื่อเปลี่ยนภาษาผลลัพธ์ด้วย
        if (document.getElementById('result').style.display === 'block') {
            calculateDamage();
        }
    }

    // ฟังก์ชันคำนวณ
    function calculateDamage() {
        let oldAtk = parseFloat(document.getElementById('oldAtk').value) || 0;
        let oldCritDmg = parseFloat(document.getElementById('oldCritDmg').value) || 0;
        let newAtk = parseFloat(document.getElementById('newAtk').value) || 0;
        let newCritDmg = parseFloat(document.getElementById('newCritDmg').value) || 0;

        let oldDamage = oldAtk * (oldCritDmg / 100);
        let newDamage = newAtk * (newCritDmg / 100);
        let diff = newDamage - oldDamage;

        let resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';

        let t = lang[currentLang]; // เรียกใช้คำแปลภาษาปัจจุบัน

        let htmlContent = `
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span style="color: #aaa;">${t.resOld}</span>
                <span class="highlight">${oldDamage.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})}</span>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <span style="color: #aaa;">${t.resNew}</span>
                <span class="highlight">${newDamage.toLocaleString(undefined, {minimumFractionDigits: 0, maximumFractionDigits: 2})}</span>
            </div>
            <hr style="border-color: #333; margin: 15px 0;">
        `;

        if (newDamage > oldDamage) {
            htmlContent += `<span class="better">${t.better}</span>
                            <span class="diff">${t.dmgUp}${diff.toLocaleString(undefined, {maximumFractionDigits: 2})}${t.unit}</span>`;
        } else if (newDamage < oldDamage) {
            htmlContent += `<span class="worse">${t.worse}</span>
                            <span class="diff">${t.dmgDown}${Math.abs(diff).toLocaleString(undefined, {maximumFractionDigits: 2})}${t.unit}</span>`;
        } else {
            htmlContent += `<span style="color: #60a5fa; font-weight: bold; font-size: 18px; display: block; margin-top: 10px;">${t.equal}</span>`;
        }

        resultDiv.innerHTML = htmlContent;
    }
</script>

</body>
</html>
